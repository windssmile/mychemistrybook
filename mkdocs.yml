# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: 大学无机化学自学教材
site_description: 面向应用化学与理论化学方向大一学生的无机化学开放自学教材
site_author: mychemistrybook contributors
site_url: !ENV [SITE_URL, "http://127.0.0.1:8000/"]

docs_dir: content
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  font: false
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

nav:
  - 首页: index.md
  - 开始学习:
      - 课程说明: course-guide.md
      - 第8章 酸碱理论与酸碱平衡:
          - 本章导学: chapters/08-acid-base/index.md
          - 8.1 酸碱模型、结构与溶剂: chapters/08-acid-base/08-01-models-structure-solvent.md

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/windssmile/mychemistrybook
      name: GitHub 仓库

copyright: 本教材仍在编写中；引用与许可信息见各页面。

strict: true
