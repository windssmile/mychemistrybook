# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: 大学无机化学自学教材
site_description: 面向应用化学与理论化学方向大一学生的无机化学开放自学教材
site_author: mychemistrybook contributors
site_url: !ENV [SITE_URL, "http://127.0.0.1:8000/"]

docs_dir: content
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  font: false
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

nav:
  - 首页: index.md
  - 开始学习:
      - 课程说明: course-guide.md
      - 第0章 课程导学与学习诊断:
          - 本章导学: chapters/00-orientation/index.md
          - 0.1 无机化学的地图：从电子到材料: chapters/00-orientation/00-01-map-electrons-to-materials.md
          - 0.2 自学系统与入门诊断: chapters/00-orientation/00-02-self-study-diagnostic.md
          - 第0章复习: chapters/00-orientation/chapter-review.md
      - 第1章 化学语言、化学计量、气体与溶液:
          - 本章导学: chapters/01-chemical-language/index.md
          - 1.1 物质、化学式与无机物命名: chapters/01-chemical-language/01-01-substances-formulas-naming.md
          - 1.2 摩尔：连接粒子与宏观测量: chapters/01-chemical-language/01-02-mole-particles-mass.md
          - 1.3 方程式、反应计量与反应进度: chapters/01-chemical-language/01-03-equations-stoichiometry-extent.md
          - 1.4 限量试剂、纯度与产率: chapters/01-chemical-language/01-04-limiting-purity-yield.md
          - 1.5 理想气体与分压: chapters/01-chemical-language/01-05-ideal-gas-partial-pressure.md
          - 1.6 溶液、浓度与水溶液反应: chapters/01-chemical-language/01-06-solutions-concentration-aqueous-reactions.md
          - 第1章复习: chapters/01-chemical-language/chapter-review.md
      - 第2章 原子结构与电子排布:
          - 本章导学: chapters/02-atomic-structure/index.md
          - 2.1 光子与原子光谱: chapters/02-atomic-structure/02-01-photons-atomic-spectra.md
          - 2.2 氢原子的玻尔模型: chapters/02-atomic-structure/02-02-bohr-model-hydrogen.md
          - 2.3 物质波与不确定性: chapters/02-atomic-structure/02-03-matter-waves-uncertainty.md
          - 2.4 波函数、轨道与量子数: chapters/02-atomic-structure/02-04-wavefunctions-orbitals-quantum-numbers.md
          - 2.5 轨道形状、节点与径向分布: chapters/02-atomic-structure/02-05-orbital-shapes-nodes-radial-distribution.md
          - 2.6 多电子原子、电子排布与磁性: chapters/02-atomic-structure/02-06-electron-configurations-magnetism.md
          - 第2章复习: chapters/02-atomic-structure/chapter-review.md
      - 第3章 元素周期律:
